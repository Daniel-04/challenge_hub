services:
  moderation-api:
    build:
      context: .
      dockerfile: Dockerfile.moderation
    ports:
      - "8000:8000"
    environment:
      - THRESHOLD_PASS=0.70
      - THRESHOLD_DELETE=0.70
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 3s
      retries: 20
      start_period: 30s

  challenge-hub:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MODERATION_API_URL=http://moderation-api:8000/moderate
    depends_on:
      moderation-api:
        condition: service_healthy
